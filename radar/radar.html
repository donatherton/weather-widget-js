<!DOCTYPE html>
<html lang="en-GB">
    <head>
        <title>RainViewer</title>

        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="leaflet.css"/>
        <link rel="stylesheet" href="style.css"/>
        <script src="leaflet.js"></script>
    </head>
    <body>
        <div id="controls">
            <button class="back_button" onclick="history.back()" aria-label="Go back">Back</button>
            <!-- <label><input type="radio" name="radarOrSat" id="radar" checked="checked">Radar</label> -->
            <!-- <label><input type="radio" name="radarOrSat" id="satellite">Sat</label> -->

            <input type="button" class="button" id="prevFrame" value="<" aria-label="Previous frame" />
            <input type="button" class="button" id="play" value=">>" aria-label="Play animation" />
            <input type="button" class="button" id="nextFrame" value=">" aria-label="Next frame" />
            <div id="time"></div>
        </div>
        <div id="mapid"></div>

        <script src="radar.js"></script>
    </body>
</html>
